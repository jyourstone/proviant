services:
  proviant:
    build: .
    container_name: proviant
    restart: unless-stopped
    ports:
      - "8099:8000"
    volumes:
      - ./appdata:/data
    environment:
      - DATA_DIR=/data
      - ICA_SESSION_COOKIE=${ICA_SESSION_COOKIE:-}
      - ICA_LIST_ID=${ICA_LIST_ID:-}
      - ICA_SYNC_INTERVAL=${ICA_SYNC_INTERVAL:-10}
