<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Proviant">
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
    <title>Proviant</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1><img src="/icon-192.png" alt="Proviant" class="header-logo"> Proviant</h1>
    </header>

    <nav class="storage-tabs">
        <button class="tab active" data-storage="freezer">🧊 Frys</button>
        <button class="tab" data-storage="fridge">🥛 Kyl</button>
        <button class="tab" data-storage="pantry">🏪 Skafferi</button>
    </nav>

    <main>
        <div class="toolbar">
            <input type="text" id="search" placeholder="Sök..." autocomplete="off">
            <button id="add-btn" class="btn btn-primary">+ Ny</button>
        </div>

        <div class="filter-bar">
            <button id="filter-toggle" class="btn btn-filter">🔽 Filter</button>
            <div id="active-filter-tags" class="active-filter-tags"></div>
        </div>

        <div id="filter-panel" class="filter-panel hidden">
            <div class="filter-section">
                <div class="filter-section-label">Status</div>
                <div class="filters" id="filters">
                    <button class="filter-chip" data-filter="out_of_stock">🔴 Slut</button>
                    <button class="filter-chip" data-filter="low_stock">🟡 Nästan slut</button>
                    <button class="filter-chip" data-filter="expiring">⏰ Utgår snart</button>
                </div>
            </div>
            <div class="filter-section">
                <div class="filter-section-label">Kategori</div>
                <div id="category-filters" class="filters category-filters"></div>
            </div>
        </div>

        <div id="items-container">
            <div id="items-list"></div>
            <div id="empty-state" class="empty-state hidden">
                <p>Tomt här! Tryck <strong>+ Ny</strong> för att lägga till.</p>
            </div>
        </div>

        <div id="summary-bar" class="summary-bar"></div>
    </main>

    <!-- Add/Edit Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Lägg till</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <form id="item-form">
                <input type="hidden" id="form-id">
                <div class="form-group">
                    <label for="form-name">Namn</label>
                    <input type="text" id="form-name" required autocomplete="off" placeholder="T.ex. Kycklingfilé">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="form-quantity">Antal</label>
                        <input type="number" id="form-quantity" value="1" min="0" step="0.5">
                    </div>
                    <div class="form-group">
                        <label for="form-unit">Enhet</label>
                        <select id="form-unit">
                            <option value="">—</option>
                            <option value="st">st</option>
                            <option value="kg">kg</option>
                            <option value="g">g</option>
                            <option value="l">l</option>
                            <option value="dl">dl</option>
                            <option value="förp">förp</option>
                            <option value="påse">påse</option>
                            <option value="burk">burk</option>
                            <option value="flaska">flaska</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="form-category">Kategori</label>
                    <input type="text" id="form-category" list="categories-list" placeholder="T.ex. Kött, Grönsaker, Bröd">
                    <datalist id="categories-list"></datalist>
                </div>
                <div class="form-group">
                    <label for="form-note">Anteckning</label>
                    <input type="text" id="form-note" placeholder="Valfri kommentar">
                </div>
                <div class="form-group">
                    <label for="form-expiry">Bäst före</label>
                    <input type="date" id="form-expiry">
                </div>
                <div class="form-actions">
                    <button type="button" id="form-delete" class="btn btn-danger hidden">Ta bort</button>
                    <div class="form-actions-right">
                        <button type="button" class="btn btn-secondary" id="form-cancel">Avbryt</button>
                        <button type="submit" class="btn btn-primary">Spara</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
